name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a GitHub Release?"
        required: true
        type: boolean
        default: false
      release_tag:
        description: 'Release Tag (e.g., v0.1.0). If empty and publish_release is true, "nightly" will be used.'
        required: false
        default: ""

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # 1. Validation Logic (Check, Fmt, Clippy, Test)
  # ---------------------------------------------------------------------------
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy -- -D warnings

      - name: Run Tests
        run: cargo test

  # ---------------------------------------------------------------------------
  # 2. Build Binaries for Musl (Portable Linux)
  # ---------------------------------------------------------------------------
  build-binaries:
    name: Build Binaries
    if: github.event.inputs.publish_release == 'true'
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross-rs
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build Release Binary
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare Artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/indidus-relay-signaling dist/indidus-relay-signaling-${{ matrix.target }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: indidus-relay-signaling-${{ matrix.target }}
          path: dist/indidus-relay-signaling-${{ matrix.target }}
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 3. Publish GitHub Release
  # ---------------------------------------------------------------------------
  publish-release:
    name: Publish Release
    if: github.event.inputs.publish_release == 'true'
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important for changelog generation

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: release-binaries
          merge-multiple: true

      - name: Set Release Metadata
        id: meta
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          if [[ -z "$TAG" ]]; then
            echo "tag=nightly" >> $GITHUB_OUTPUT
            echo "name=Nightly Build" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "name=Release $TAG" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Changelog
        if: github.event.inputs.release_tag != ''
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: |
            ${{ steps.build_changelog.outputs.changelog }}

            ### Manual Release Info
            Triggered via workflow_dispatch.
            Committed at: ${{ github.event.head_commit.timestamp }}
            Commit SHA: ${{ github.sha }}
          files: release-binaries/*
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          make_latest: ${{ steps.meta.outputs.prerelease == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

